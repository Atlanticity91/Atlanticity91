name: Latest Youtube videos.
on:
  schedule: 
    - cron: "0 12 * * 0"
  workflow_dispatch:
  
jobs:
  update-readme-with-youtube:
    name: Update this repo's README.md with latest Youtube videos links.
    runs-on: ubuntu-latest
    steps:
      - uses: action/checkout@v2
      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          comment_tag_name: "YT_VIDEO"
          feed_list: "https://www.youtube.com/feeds/videos.xml?channel_id=UCp4fK32cKkShxTkwyXoa3UA"
